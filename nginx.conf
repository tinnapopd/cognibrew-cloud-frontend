server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    resolver NS_PLACEHOLDER valid=10s;

    # Reverse proxy to Edge Gateway API
    location /api/v1/ {
        set $api_backend "http://cognibrew-app-edge-gateway.cognibrew-app.svc.cluster.local:8000";
        proxy_pass         $api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # Reverse proxy to Embedding / Inference Service
    location /api/embed {
        set $embed_backend "http://inference-server.cognibrew-baseline.svc.cluster.local:8000";
        proxy_pass         $embed_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }
}